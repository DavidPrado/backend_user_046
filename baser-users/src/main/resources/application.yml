spring:
  application:
    name: Sistema-Usuarios-ETEC

  # Banco de Dados Reativo (R2DBC)
  r2dbc:
    url: r2dbc:postgresql://localhost:5435/
    username:
    password:
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  # Banco de Dados Tradicional (JDBC) - Usado pelo Flyway
  datasource:
    url: jdbc:postgresql://localhost:5435/
    username:
    password:
    driver-class-name: org.postgresql.Driver

  # Migraï¿½ï¿½es com Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    url: ${spring.datasource.url}
    repair-on-migrate: true
    #out-of-order: true

  # Configuraï¿½ï¿½es do Spring Boot Admin Client
  boot:
    admin:
      client:
        url: http://localhost:9090
        username:
        password:
        instance:
          metadata:
            user:
              name:
              password:

  # Seguranï¿½a Interna (Spring Security)
  security:
    user:
      name:
      password:
      roles:

  # Configuraï¿½ï¿½es de E-mail (SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username:
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000


# Configuraï¿½ï¿½es Customizadas (JWT)
jwt:
  secret:
  expiration:

management:
  endpoints:
    web:
      exposure:
        # Expï¿½e os endpoints necessï¿½rios.
        # Em prod, por seguranï¿½a, vocï¿½ pode listar apenas o que usa:
        include: "health,info,loggers,logfile,metrics"
  endpoint:
    loggers:
      enabled: true
    health:
      show-details: always

# Informaï¿½ï¿½es da Aplicaï¿½ï¿½o
info:
  app:
    name: Sistema de Usuï¿½rios ETEC
    description: Microserviï¿½o de gerenciamento de usuï¿½rios com WebFlux
    version: 1.0.0

# Caminho para o arquivo de log (O Actuator precisa disso para exibir o log no Admin)
logging:
  file:
    name: logs/app-usuarios.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7