server:
  port: 28080

spring:
  application:
    name: Sistema-Usuarios-ETEC-DEV

  r2dbc:
    url: r2dbc:postgresql://localhost:5435/
    username:
    password:
    pool:
      initial-size: 2
      max-size: 10

  datasource:
    url: jdbc:postgresql://localhost:5435/
    username:
    password:
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    url: ${spring.datasource.url}
    repair-on-migrate: true

  boot:
    admin:
      client:
        url: http://localhost:29090
        username:
        password:
        instance:
          service-base-url: http://localhost:${server.port}
          metadata:
            user:
              name:
              password:

  security:
    user:
      name:
      password:
      roles:

  mail:
    host: smtp.gmail.com
    port: 587
    username:
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret:
  expiration:

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

info:
  app:
    name: Sistema de Usuários ETEC (AMBIENTE DEV)
    version: 1.0.0-SNAPSHOT

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.springframework.data.r2dbc: DEBUG
    io.r2dbc.postgresql: DEBUG
  file:
    name: logs/app-usuarios-dev.log